name: Package.json Protection

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  check-package-json:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Check changed files
        id: changed-files
        uses: tj-actions/changed-files@v45
        with:
          files: |
            package.json
            package-lock.json

      - name: Close PR if package.json is modified
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.pull_request.user.login;
            const prNumber = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `Hi @${author}\n\nThis PR has been closed automatically because it contains changes to \`package.json`.\n\nPlease do not push modifications to \`package.json\` in your pull requests.`
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              state: 'closed'
            });
